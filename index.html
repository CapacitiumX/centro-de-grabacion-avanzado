<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX V329 - ULTIMATE STUDIO PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <style>
        :root { --neon: #00ff00; --dark: #050505; --red: #ff3333; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #111; padding: 10px 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; }

        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 340px; background: #000; border-right: 1px solid #333; padding: 12px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .btn-load { background: var(--neon); color: black; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; border-radius: 4px; border: none; font-size: 11px; }
        
        #media-list { flex: 1; min-height: 90px; max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .thumb-nav { padding: 6px; background: #222; border: 1px solid #444; font-size: 11px; cursor: pointer; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .thumb-nav.active { border-color: var(--neon); background: #111; }
        .fx-tag { color: #ffeb3b; font-size: 9px; font-weight: bold; }

        .section-title { font-size: 10px; color: var(--neon); font-weight: bold; text-transform: uppercase; margin-top: 6px; }
        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }

        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; }
        #canvas-render { width: 95%; max-width: 850px; aspect-ratio: 16/9; border: 1px solid #333; background: #000; }
        
        .console { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 6px; }
        .btn-c { background: rgba(0,0,0,0.85); border: 1px solid var(--neon); color: var(--neon); padding: 6px 8px; cursor: pointer; font-size: 10px; font-weight: bold; border-radius: 4px; }

        .footer { height: 110px; background: #111; border-top: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .btn-rec { background: var(--red); color: white; padding: 12px 25px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; font-size: 13px; }
        .btn-pause { background: #ff9800; color: black; padding: 12px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; font-size: 13px; }
        .btn-next { background: #333; border: 1px solid var(--neon); color: var(--neon); padding: 12px 20px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 13px; }
        .recording { animation: pulse 1s infinite; box-shadow: 0 0 20px var(--red); }
        @keyframes pulse { 50% { opacity: 0.5; } }
        
        .input-text { background: #222; color: white; border: 1px solid var(--neon); padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CAPACITIUMX V329 - ULTIMATE STUDIO</div>
    <div id="status-mic" style="color:yellow; font-size: 12px;">ESTADO: CARGANDO IA...</div>
</header>

<div class="main">
    <aside class="sidebar">
        <button class="btn-load" onclick="document.getElementById('file-in').click()">📥 SUBIR FOTOS / VIDEOS</button>
        <input type="file" id="file-in" multiple accept="image/*,video/*" style="display:none;" onchange="handleFiles(event)">
        
        <input type="text" id="slide-text" class="input-text" placeholder="Texto para este slide..." oninput="updateCurrentText()">
        <div id="media-list"></div>

        <div class="section-title">🎬 20 Transiciones PowerPoint (Aplica a Foto Actual)</div>
        <div class="grid-buttons">
            <button class="btn-c" onclick="setAnimMode('zoom')">🔍 1. Zoom</button>
            <button class="btn-c" onclick="setAnimMode('slide')">↔️ 2. Cortina</button>
            <button class="btn-c" onclick="setAnimMode('blinds')">🪟 3. Persiana Horiz.</button>
            <button class="btn-c" onclick="setAnimMode('flip')">🔄 4. Giro 3D</button>
            <button class="btn-c" onclick="setAnimMode('fade')">✨ 5. Desvanecer</button>
            <button class="btn-c" onclick="setAnimMode('pop')">💥 6. Explosión</button>
            <button class="btn-c" onclick="setAnimMode('drop')">⬇️ 7. Caída</button>
            <button class="btn-c" onclick="setAnimMode('wipe')">↕️ 8. Barrido Arriba</button>
            <button class="btn-c" onclick="setAnimMode('spinZoom')">🌀 9. Spin Zoom</button>
            <button class="btn-c" onclick="setAnimMode('bounce')">⚽ 10. Rebote</button>
            <button class="btn-c" onclick="setAnimMode('scale')">📐 11. Escalado</button>
            <button class="btn-c" onclick="setAnimMode('windmill')">🎡 12. Molino</button>
            <button class="btn-c" onclick="setAnimMode('diagonal')">↗️ 13. Diagonal</button>
            <button class="btn-c" onclick="setAnimMode('flash')">⚡ 14. Flash</button>
            <button class="btn-c" onclick="setAnimMode('vBlinds')">🏛️ 15. Persiana Vert.</button>
            <button class="btn-c" onclick="setAnimMode('reveal')">👁️ 16. Revelar</button>
            <button class="btn-c" onclick="setAnimMode('rise')">⬆️ 17. Elevar</button>
            <button class="btn-c" onclick="setAnimMode('swing')">🔔 18. Balanceo</button>
            <button class="btn-c" onclick="setAnimMode('dBlinds')">📐 19. Persiana Diag.</button>
            <button class="btn-c" onclick="setAnimMode('none')">⏹️ 20. Estático</button>
        </div>

        <div class="section-title">🎨 Filtros para Foto / Flyer</div>
        <div class="grid-buttons">
            <button class="btn-c" onclick="imgFilter='none'">Normal</button>
            <button class="btn-c" onclick="imgFilter='sepia(0.8)'">Sepia</button>
            <button class="btn-c" onclick="imgFilter='grayscale(1)'">B&N</button>
            <button class="btn-c" onclick="imgFilter='contrast(1.3) brightness(1.1)'">Piel Realce</button>
            <button class="btn-c" onclick="imgFilter='saturate(2)'">Saturado</button>
            <button class="btn-c" onclick="imgFilter='hue-rotate(180deg)'">Neón FX</button>
        </div>

        <div class="section-title">🖼️ Fondo Virtual CÁMARA (IA HD)</div>
        <div class="grid-buttons">
            <button class="btn-c" onclick="setBgMode('yellow')">🟨 Amarillo</button>
            <button class="btn-c" onclick="setBgMode('blue')">🟦 Azul Sólido</button>
            <button class="btn-c" onclick="setBgMode('orange')">🟧 Naranja</button>
            <button class="btn-c" onclick="setBgMode('green')">🟩 Verde Chroma</button>
            <button class="btn-c" onclick="setBgMode('red')">🟥 Rojo Sólido</button>
            <button class="btn-c" onclick="setBgMode('purple')">🟪 Púrpura</button>
            <button class="btn-c" onclick="setBgMode('dark')">⬛ Gris Estudio</button>
            <button class="btn-c" onclick="setBgMode('white')">⬜ Blanco</button>
            <button class="btn-c" onclick="setBgMode('office')">🏢 Oficina</button>
            <button class="btn-c" onclick="setBgMode('none')">🚫 Real / Sin IA</button>
        </div>
        <button class="btn-load" style="margin-top:4px;" onclick="document.getElementById('custom-bg-in').click()">🖼️ SUBIR FOTO PROPIA DE FONDO</button>
        <input type="file" id="custom-bg-in" accept="image/*" style="display:none;" onchange="handleCustomBg(event)">
    </aside>

    <main class="monitor-area">
        <div class="console">
            <span style="font-size: 9px; color: var(--neon); text-align: center;">MODO CÁMARA</span>
            <button class="btn-c" onclick="camMode='full'">👤 YO GRANDE</button>
            <button class="btn-c" onclick="camMode='mini'">🖼️ YO CHICO</button>
            <button class="btn-c" onclick="camMode='off'">🚫 OCULTARME</button>
            
            <button class="btn-c" id="playBtn" style="margin-top:5px;" onclick="togglePlay()">▶ PLAY FONDO</button>
        </div>
        <canvas id="canvas-render" width="1280" height="720"></canvas>
    </main>
</div>

<div class="footer">
    <div style="display:flex; gap:15px; align-items: center;">
        <button id="recBtn" class="btn-rec" onclick="startCapture()">🎙️ EMPEZAR GRABACIÓN</button>
        <button id="pauseBtn" class="btn-pause" onclick="togglePause()">⏸ PAUSAR (CORTAR)</button>
        <button class="btn-next" onclick="nextSlide()">SIGUIENTE FOTO ➡️</button>
        <button id="dlBtn" style="display:none; background:var(--neon); color:black; padding:12px 20px; font-weight:bold; cursor:pointer; border:none; border-radius:8px;" onclick="download()">📥 GUARDAR VIDEO FINAL</button>
    </div>
    <div style="color:#666; font-size:10px;">TIP: PRESIONA LA TECLA 'ESPACIO' PARA PAUSAR/REANUDAR SI TE TRABAS AL HABLAR.</div>
</div>

<video id="v-cam" autoplay playsinline style="display:none"></video>
<video id="v-bg" loop style="display:none" crossOrigin="anonymous"></video>
<canvas id="canvas-cam-processed" width="1280" height="720" style="display:none"></canvas>

<script>
    const canvas = document.getElementById('canvas-render');
    const ctx = canvas.getContext('2d');
    const vCam = document.getElementById('v-cam');
    const vBg = document.getElementById('v-bg');
    const slideTextInput = document.getElementById('slide-text');
    
    const procCanvas = document.getElementById('canvas-cam-processed');
    const procCtx = procCanvas.getContext('2d');

    let library = [], curIdx = -1, camMode = 'mini', camX = 930, camY = 50, camW = 300, camH = 225, dragging = false;
    let imgFilter = 'none';
    let bgMode = 'yellow'; 
    let customBgImg = null;
    let transitionTimer = 0;
    let recorder, chunks = [], isRecording = false, isPaused = false, audioCtx, finalBlob;
    let selfieSegmentation = null;
    let latestMask = null;

    // --- INTEGRACIÓN Y OPTIMIZACIÓN DE IA DE BORDES HD ---
    function initAI() {
        selfieSegmentation = new SelfieSegmentation({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
        });
        
        // modelSelection: 0 -> Optimizado para retratos/selfies con mejor definición en bordes de cabello
        selfieSegmentation.setOptions({ modelSelection: 0 });
        selfieSegmentation.onResults(onResultsAI);

        navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } }).then(stream => {
            vCam.srcObject = stream;
            document.getElementById('status-mic').innerText = "ESTADO: IA LISTA";
            processAIFrames();
        });
    }

    async function processAIFrames() {
        if (vCam.readyState >= 2) {
            await selfieSegmentation.send({ image: vCam });
        }
        requestAnimationFrame(processAIFrames);
    }

    function onResultsAI(results) {
        latestMask = results.segmentationMask;
        
        procCtx.save();
        procCtx.clearRect(0, 0, procCanvas.width, procCanvas.height);

        if (bgMode === 'none') {
            procCtx.drawImage(vCam, 0, 0, procCanvas.width, procCanvas.height);
        } else {
            // 1. Dibujar el fondo virtual elegido
            drawVirtualBackgroundToCtx(procCtx, 0, 0, procCanvas.width, procCanvas.height);

            // 2. Aplicar un suavizado leve a la máscara de IA para evitar bordes dentados en pelo/orejas
            procCtx.save();
            procCtx.globalCompositeOperation = 'destination-out';
            procCtx.filter = 'blur(3px)'; // Filtro de suavizado suave
            procCtx.drawImage(latestMask, 0, 0, procCanvas.width, procCanvas.height);
            procCtx.restore();

            // 3. Superponer el cuerpo real limpio sobre el fondo
            procCtx.globalCompositeOperation = 'destination-over';
            procCtx.drawImage(vCam, 0, 0, procCanvas.width, procCanvas.height);
        }
        procCtx.restore();
    }

    function drawVirtualBackgroundToCtx(context, x, y, w, h) {
        context.save();
        switch(bgMode) {
            case 'yellow': context.fillStyle = '#ffcc00'; context.fillRect(x, y, w, h); break;
            case 'blue': context.fillStyle = '#0044ff'; context.fillRect(x, y, w, h); break;
            case 'orange': context.fillStyle = '#ff6600'; context.fillRect(x, y, w, h); break;
            case 'green': context.fillStyle = '#00b140'; context.fillRect(x, y, w, h); break;
            case 'red': context.fillStyle = '#cc0000'; context.fillRect(x, y, w, h); break;
            case 'purple': context.fillStyle = '#8800cc'; context.fillRect(x, y, w, h); break;
            case 'dark': context.fillStyle = '#222222'; context.fillRect(x, y, w, h); break;
            case 'white': context.fillStyle = '#ffffff'; context.fillRect(x, y, w, h); break;
            case 'office':
                let grad = context.createLinearGradient(x, y, x, y + h);
                grad.addColorStop(0, '#2c3e50');
                grad.addColorStop(0.7, '#34495e');
                grad.addColorStop(1, '#111111');
                context.fillStyle = grad;
                context.fillRect(x, y, w, h);
                context.fillStyle = '#4a3b32';
                context.fillRect(x, y + h - (h*0.22), w, h*0.22);
                break;
            case 'custom':
                if (customBgImg) context.drawImage(customBgImg, x, y, w, h);
                else { context.fillStyle = '#ffcc00'; context.fillRect(x, y, w, h); }
                break;
            default:
                context.fillStyle = '#000000'; context.fillRect(x, y, w, h);
        }
        context.restore();
    }

    function handleFiles(e) {
        Array.from(e.target.files).forEach(file => {
            const url = URL.createObjectURL(file);
            const isVid = file.type.includes('video');
            const item = { type: isVid ? 'vid' : 'img', url, el: null, text: "", anim: 'zoom' };
            if (!isVid) { const img = new Image(); img.src = url; item.el = img; }
            library.push(item);
            updateList();
            if(curIdx === -1) selectMedia(0);
        });
    }

    function handleCustomBg(e) {
        if(e.target.files[0]) {
            const img = new Image();
            img.src = URL.createObjectURL(e.target.files[0]);
            img.onload = () => {
                customBgImg = img;
                bgMode = 'custom';
            };
        }
    }

    function setBgMode(mode) { bgMode = mode; }

    function setAnimMode(anim) {
        if (curIdx !== -1) {
            library[curIdx].anim = anim;
            transitionTimer = 0;
            updateList();
        }
    }

    function updateList() {
        const list = document.getElementById('media-list');
        list.innerHTML = "";
        library.forEach((m, i) => {
            const d = document.createElement('div');
            d.className = `thumb-nav ${i === curIdx ? 'active' : ''}`;
            d.onclick = () => selectMedia(i);
            
            const label = document.createElement('span');
            label.innerText = `${i+1}. ${m.type === 'vid' ? '🎥' : '🖼️'} ${m.text.substring(0,10)}...`;
            
            const fxTag = document.createElement('span');
            fxTag.className = 'fx-tag';
            fxTag.innerText = m.type === 'img' ? `⭐ ${m.anim}` : '';

            d.appendChild(label);
            d.appendChild(fxTag);
            list.appendChild(d);
        });
    }

    function selectMedia(i) {
        curIdx = i;
        transitionTimer = 0;
        slideTextInput.value = library[i].text || "";
        if (library[i].type === 'vid') { vBg.src = library[i].url; vBg.play(); }
        updateList();
    }

    function nextSlide() {
        if (library.length > 0) {
            let nextIdx = (curIdx + 1) % library.length;
            selectMedia(nextIdx);
        }
    }

    function updateCurrentText() { if(curIdx !== -1) library[curIdx].text = slideTextInput.value; }
    function togglePlay() { if (vBg.paused) vBg.play(); else vBg.pause(); }

    // --- 20 TRANSICIONES ANIMADAS ESTILO POWERPOINT ---
    function renderImageWithAnimation(img, animMode) {
        transitionTimer += 0.02;
        let t = Math.min(transitionTimer, 1);
        const cw = canvas.width, ch = canvas.height;

        ctx.save();
        ctx.filter = imgFilter;

        switch(animMode) {
            case 'zoom':
                let sz = 1 + (Math.sin(transitionTimer * 0.5) * 0.08);
                ctx.translate(cw / 2, ch / 2); ctx.scale(sz, sz);
                ctx.drawImage(img, -cw / 2, -ch / 2, cw, ch);
                break;
            case 'slide':
                let px = (1 - Math.pow(1 - t, 3)) * cw - cw;
                ctx.drawImage(img, px, 0, cw, ch);
                break;
            case 'blinds':
                let strips = 8, stripW = cw / strips, pW = stripW * t;
                for (let i = 0; i < strips; i++) { ctx.drawImage(img, i * stripW, 0, pW, ch, i * stripW, 0, pW, ch); }
                break;
            case 'flip':
                ctx.translate(cw / 2, ch / 2); ctx.scale(Math.cos((1 - t) * Math.PI), 1);
                ctx.drawImage(img, -cw / 2, -ch / 2, cw, ch);
                break;
            case 'fade':
                ctx.globalAlpha = t; ctx.drawImage(img, 0, 0, cw, ch);
                break;
            case 'pop':
                let pScale = t < 0.8 ? t * 1.1 : 1;
                ctx.translate(cw / 2, ch / 2); ctx.scale(pScale, pScale);
                ctx.drawImage(img, -cw / 2, -ch / 2, cw, ch);
                break;
            case 'drop':
                let py = (1 - Math.pow(1 - t, 2)) * ch - ch;
                ctx.drawImage(img, 0, py, cw, ch);
                break;
            case 'wipe':
                ctx.drawImage(img, 0, 0, cw, ch * t, 0, 0, cw, ch * t);
                break;
            case 'spinZoom':
                ctx.translate(cw / 2, ch / 2); ctx.rotate((1 - t) * Math.PI); ctx.scale(t, t);
                ctx.drawImage(img, -cw / 2, -ch / 2, cw, ch);
                break;
            case 'bounce':
                let bY = Math.abs(Math.sin(transitionTimer * 4) * (1 - t) * 100);
                ctx.drawImage(img, 0, -bY, cw, ch);
                break;
            case 'scale':
                ctx.translate(cw / 2, ch / 2); ctx.scale(t, t);
                ctx.drawImage(img, -cw / 2, -ch / 2, cw, ch);
                break;
            case 'windmill':
                ctx.translate(cw / 2, ch / 2); ctx.rotate((1 - t) * Math.PI * 2);
                ctx.drawImage(img, -cw / 2, -ch / 2, cw, ch);
                break;
            case 'diagonal':
                ctx.drawImage(img, (1 - t) * -cw, (1 - t) * -ch, cw, ch);
                break;
            case 'flash':
                ctx.globalAlpha = (Math.sin(transitionTimer * 10) > 0 || t === 1) ? 1 : 0.2;
                ctx.drawImage(img, 0, 0, cw, ch);
                break;
            case 'vBlinds':
                let vStrips = 8, vH = ch / vStrips, pH = vH * t;
                for (let i = 0; i < vStrips; i++) { ctx.drawImage(img, 0, i * vH, cw, pH, 0, i * vH, cw, pH); }
                break;
            case 'reveal':
                let rW = cw * t, rH = ch * t;
                ctx.drawImage(img, (cw - rW)/2, (ch - rH)/2, rW, rH, (cw - rW)/2, (ch - rH)/2, rW, rH);
                break;
            case 'rise':
                ctx.drawImage(img, 0, (1 - t) * ch, cw, ch);
                break;
            case 'swing':
                ctx.translate(cw / 2, 0); ctx.rotate(Math.sin(transitionTimer * 3) * (1 - t) * 0.2);
                ctx.drawImage(img, -cw / 2, 0, cw, ch);
                break;
            case 'dBlinds':
                ctx.save(); ctx.beginPath(); ctx.rect(0, 0, cw * t, ch * t); ctx.clip();
                ctx.drawImage(img, 0, 0, cw, ch); ctx.restore();
                break;
            default:
                ctx.drawImage(img, 0, 0, cw, ch);
        }
        ctx.restore();
    }

    function render() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // --- 1. SLIDE (FOTO / VIDEO) ---
        if (curIdx !== -1) {
            const m = library[curIdx];
            if (m.type === 'img' && m.el) {
                renderImageWithAnimation(m.el, m.anim || 'zoom');
            } else if (m.type === 'vid') {
                ctx.drawImage(vBg, 0, 0, canvas.width, canvas.height);
            }
            
            if(m.text) {
                ctx.fillStyle = "yellow"; ctx.font = "bold 60px Impact"; ctx.textAlign = "center";
                ctx.strokeStyle = "black"; ctx.lineWidth = 8;
                ctx.strokeText(m.text.toUpperCase(), canvas.width/2, 650);
                ctx.fillText(m.text.toUpperCase(), canvas.width/2, 650);
            }
        }

        // --- 2. CÁMARA CON FONDO VIRTUAL PROCESADO POR IA ---
        if (camMode !== 'off' && vCam.srcObject) {
            let cx = (camMode === 'full') ? 0 : camX;
            let cy = (camMode === 'full') ? 0 : camY;
            let cw = (camMode === 'full') ? canvas.width : camW;
            let ch = (camMode === 'full') ? canvas.height : camH;

            ctx.save();
            if (camMode === 'mini') {
                ctx.strokeStyle = "#00ff00"; 
                ctx.lineWidth = 3;
                ctx.strokeRect(cx, cy, cw, ch);
            }
            ctx.drawImage(procCanvas, cx, cy, cw, ch);
            ctx.restore();
        }

        requestAnimationFrame(render);
    }

    async function startCapture() {
        const btn = document.getElementById('recBtn');
        
        if (!isRecording) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            const canvasStream = canvas.captureStream(30);
            const destination = audioCtx.createMediaStreamDestination();
            audioCtx.createMediaStreamSource(micStream).connect(destination);

            if (curIdx !== -1 && library[curIdx].type === 'vid') {
                const vidSource = audioCtx.createMediaElementSource(vBg);
                vidSource.connect(destination);
                vidSource.connect(audioCtx.destination);
            }

            const combined = new MediaStream([...canvasStream.getVideoTracks(), ...destination.stream.getAudioTracks()]);
            recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9' });
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                finalBlob = new Blob(chunks, { type: 'video/webm' });
                document.getElementById('dlBtn').style.display = "block";
            };
            
            recorder.start(); 
            isRecording = true;
            btn.innerText = "⏹ TERMINAR";
            btn.classList.add('recording');
            document.getElementById('status-mic').innerText = "🔴 GRABANDO...";
        } else {
            recorder.stop();
            isRecording = false;
            btn.innerText = "🎙️ EMPEZAR GRABACIÓN";
            btn.classList.remove('recording');
        }
    }

    function togglePause() {
        const pBtn = document.getElementById('pauseBtn');
        if (!isRecording) return;
        
        if (!isPaused) {
            recorder.pause();
            isPaused = true;
            pBtn.innerText = "▶ REANUDAR";
            document.getElementById('status-mic').innerText = "⏸ PAUSADO (CORTA AQUÍ)";
        } else {
            recorder.resume();
            isPaused = false;
            pBtn.innerText = "⏸ PAUSAR (CORTAR)";
            document.getElementById('status-mic').innerText = "🔴 GRABANDO...";
        }
    }

    function download() {
        const a = document.createElement('a'); a.href = URL.createObjectURL(finalBlob);
        a.download = `CAPACITIUMX_FINAL.webm`; a.click();
    }

    // ATAJO ESPACIO
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && isRecording) {
            e.preventDefault();
            togglePause();
        }
    });

    // ARRASTRE DE CÁMARA
    canvas.onmousedown = (e) => {
        const r = canvas.getBoundingClientRect();
        const x = (e.clientX - r.left) * (canvas.width / r.width);
        const y = (e.clientY - r.top) * (canvas.height / r.height);
        if(camMode === 'mini' && x > camX && x < camX + camW && y > camY && y < camY + camH) dragging = true;
    };
    window.onmousemove = (e) => {
        if(dragging) {
            const r = canvas.getBoundingClientRect();
            camX = (e.clientX - r.left) * (canvas.width / r.width) - camW/2;
            camY = (e.clientY - r.top) * (canvas.height / r.height) - camH/2;
        }
    };
    window.onmouseup = () => dragging = false;

    // Inicializar IA y renderizado
    initAI();
    render();
</script>
</body>
</html>
